<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaqwaSteps — Walk With Faith</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{
  --gold:#c9a84c;--gold-light:#e8c96a;
  --teal-deep:#061a1a;--teal-mid:#0a2e2e;
  --cream:#f5f0e8;--cream-dim:rgba(245,240,232,.65);
  --cream-muted:rgba(245,240,232,.35);--bg:#061a1a;
}
body{background:var(--bg);font-family:'Lato',sans-serif;color:var(--cream);overflow-x:hidden;min-height:100vh}
button{cursor:pointer;border:none;font-family:'Lato',sans-serif}
input,textarea{font-family:'Lato',sans-serif;outline:none}
a{text-decoration:none;color:inherit}

/* ── STARS ── */
.stars-fixed{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;opacity:0;animation:twinkle var(--d,3s) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.8)}50%{opacity:var(--o,.5);transform:scale(1.2)}}
.glow-fixed{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(ellipse,rgba(201,168,76,.09),transparent 65%);pointer-events:none;z-index:0;max-width:100vw}

/* ── SCREEN SYSTEM ── */
.screen{display:none;position:relative;z-index:1;min-height:100vh;width:100%}
.screen.active{display:flex}

/* ══════════════════════════════════════════
   LOADING SCREEN
══════════════════════════════════════════ */
#s-loading{flex-direction:column;align-items:center;justify-content:center;background:var(--bg);position:fixed;inset:0;z-index:999;transition:opacity .6s}
.load-logo{width:88px;height:88px;border-radius:50%;border:2px solid rgba(201,168,76,.3);box-shadow:0 0 40px rgba(201,168,76,.2);animation:loadPulse 2s ease-in-out infinite;margin-bottom:18px;object-fit:cover}
.load-name{font-family:'Cinzel',serif;font-size:18px;letter-spacing:.24em;color:var(--gold-light)}
.load-dots{display:flex;gap:7px;margin-top:18px}
.load-dots span{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:dotB 1.2s ease-in-out infinite}
.load-dots span:nth-child(2){animation-delay:.2s}
.load-dots span:nth-child(3){animation-delay:.4s}
@keyframes loadPulse{0%,100%{opacity:.6;transform:scale(.95)}50%{opacity:1;transform:scale(1.05)}}
@keyframes dotB{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}

/* ══════════════════════════════════════════
   AUTH SCREEN
══════════════════════════════════════════ */
#s-auth{flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(160deg,#04100f,#072020,#04100f)}
.auth-wrap{width:100%;max-width:400px}
.auth-logo-area{text-align:center;margin-bottom:28px}
.auth-logo-img{width:76px;height:76px;border-radius:50%;border:2px solid rgba(201,168,76,.3);box-shadow:0 0 32px rgba(201,168,76,.18);margin-bottom:12px;object-fit:cover;animation:loadPulse 4s ease-in-out infinite}
.auth-app-name{font-family:'Cinzel',serif;font-size:20px;letter-spacing:.22em;color:var(--gold-light)}
.auth-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--cream-muted);margin-top:5px}
.auth-card{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);border-radius:24px;padding:32px 28px;position:relative}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.25),transparent)}
.auth-tabs{display:flex;background:rgba(255,255,255,.04);border-radius:50px;padding:4px;margin-bottom:24px}
.atab{flex:1;padding:9px;border-radius:50px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;color:var(--cream-muted);background:none;border:none;transition:all .3s}
.atab.active{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--teal-deep);font-weight:700}
.aform{display:flex;flex-direction:column;gap:13px}
.afield label{display:block;font-size:9px;letter-spacing:.14em;color:var(--cream-muted);margin-bottom:5px;font-family:'Cinzel',serif}
.afield input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.15);border-radius:12px;padding:13px 16px;font-size:13px;color:var(--cream);transition:border-color .3s}
.afield input:focus{border-color:rgba(201,168,76,.5);background:rgba(255,255,255,.07)}
.afield input::placeholder{color:rgba(245,240,232,.2);font-style:italic}
.remember-row{display:flex;align-items:center;gap:9px}
.remember-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;border-radius:4px}
.remember-row label{font-size:12px;color:var(--cream-muted);cursor:pointer}
.abtn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--teal-deep);border:none;padding:14px;border-radius:50px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.12em;font-weight:700;transition:opacity .3s,transform .2s;box-shadow:0 6px 22px rgba(201,168,76,.2);margin-top:2px}
.abtn:hover{opacity:.9;transform:translateY(-1px)}
.abtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.adivider{display:flex;align-items:center;gap:12px;margin:2px 0}
.adivider span{font-size:10px;color:rgba(245,240,232,.2)}
.adivider::before,.adivider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.agoogle{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(245,240,232,.7);padding:12px;border-radius:50px;font-size:13px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .3s}
.agoogle:hover{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.08)}
.auth-footer-txt{font-size:12px;color:rgba(245,240,232,.3);margin-top:16px;text-align:center}
.auth-footer-txt span{color:var(--gold);cursor:pointer}
.auth-err{font-size:12px;color:#ff9090;background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);border-radius:10px;padding:10px 14px;display:none;margin-bottom:4px;text-align:center}
.auth-err.show{display:block}
.auth-success{font-size:12px;color:#90ffb0;background:rgba(50,200,100,.08);border:1px solid rgba(50,200,100,.2);border-radius:10px;padding:10px 14px;display:none;margin-bottom:4px;text-align:center}
.auth-success.show{display:block}

/* ══════════════════════════════════════════
   HOME APP SCREEN
══════════════════════════════════════════ */
#s-home{flex-direction:column;background:linear-gradient(160deg,#04100f,#072020,#04100f)}

/* App top nav */
.app-topnav{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(6,26,26,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,.08);position:sticky;top:0;z-index:50}
.topnav-left{display:flex;align-items:center;gap:10px}
.topnav-logo{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(201,168,76,.3);object-fit:cover}
.topnav-name{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.18em;color:var(--gold-light)}
.topnav-right{display:flex;align-items:center;gap:10px}
.topnav-user{font-size:10px;color:var(--cream-muted);font-family:'Cinzel',serif;letter-spacing:.08em}
.signout-btn{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);color:var(--cream-muted);padding:6px 14px;border-radius:50px;font-size:10px;font-family:'Cinzel',serif;letter-spacing:.1em;transition:all .3s}
.signout-btn:hover{border-color:var(--gold);color:var(--gold-light)}

/* App body */
.app-body{padding:24px 18px 100px;max-width:480px;margin:0 auto;width:100%;overflow-y:auto}

/* Greeting */
.greeting-block{margin-bottom:22px;animation:fadeUp .5s ease both}
.greet-lbl{font-size:10px;color:var(--cream-muted);letter-spacing:.14em;margin-bottom:4px}
.greet-name{font-family:'Cinzel',serif;font-size:24px;color:var(--gold-light);letter-spacing:.1em}
.greet-arabic{font-size:15px;color:rgba(201,168,76,.45);direction:rtl;margin-top:5px}

/* Cards */
.streak-card{background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.05));border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:18px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;animation:fadeUp .5s ease .05s both}
.streak-num{font-family:'Cinzel',serif;font-size:44px;color:var(--gold-light);line-height:1}
.streak-lbl{font-size:9px;color:var(--cream-muted);letter-spacing:.16em;margin-top:4px}
.streak-fire{font-size:40px;filter:drop-shadow(0 0 10px rgba(255,140,0,.5))}

.sec-hd{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.18em;color:var(--gold);margin-bottom:10px}

/* Salah card */
.salah-card{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.12);border-radius:18px;padding:16px;margin-bottom:18px;animation:fadeUp .5s ease .1s both}
.prayers-row{display:flex;justify-content:space-between;gap:6px}
.p-item{flex:1;text-align:center}
.p-name{font-size:7px;color:var(--cream-muted);letter-spacing:.06em;margin-bottom:5px;font-family:'Cinzel',serif}
.p-dot{width:30px;height:30px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all .25s;border:1.5px solid}
.p-dot.done{background:rgba(201,168,76,.2);border-color:var(--gold);color:var(--gold-light)}
.p-dot.done:hover{background:rgba(201,168,76,.35)}
.p-dot.pending{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:rgba(245,240,232,.2)}
.p-dot.pending:hover{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.08)}
.p-arabic{font-size:9px;color:rgba(201,168,76,.35);direction:rtl;margin-top:4px}
.p-dot.done + .p-arabic,.salah-card .done ~ .p-arabic{color:rgba(201,168,76,.6)}

/* Progress bar */
.prog-wrap{margin-top:14px}
.prog-bar-bg{width:100%;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:2px;transition:width .5s ease}
.prog-label{display:flex;justify-content:space-between;margin-top:6px}
.prog-txt{font-size:10px;color:var(--cream-muted);font-family:'Cinzel',serif}
.prog-count{font-size:10px;color:var(--gold);font-family:'Cinzel',serif}

/* Next prayer */
.next-card{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);border-radius:18px;padding:16px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;animation:fadeUp .5s ease .15s both}
.next-icon{font-size:30px;filter:drop-shadow(0 0 8px rgba(201,168,76,.4))}
.next-info{flex:1}
.next-lbl{font-size:9px;color:var(--cream-muted);letter-spacing:.12em}
.next-prayer-name{font-family:'Cinzel',serif;font-size:17px;color:var(--gold-light);margin:3px 0}
.next-time-txt{font-size:12px;color:var(--cream-dim)}
.next-pill{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.1em;color:var(--gold);border:1px solid rgba(201,168,76,.3);border-radius:50px;padding:5px 12px;white-space:nowrap}

/* Actions grid */
.actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px;animation:fadeUp .5s ease .2s both}
.act-card{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.1);border-radius:16px;padding:18px 12px;text-align:center;cursor:pointer;transition:all .3s}
.act-card:hover{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.07);transform:translateY(-3px)}
.act-icon{font-size:28px;margin-bottom:7px;display:block}
.act-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;color:var(--gold)}
.act-sub{font-size:11px;color:var(--cream-muted);margin-top:3px}

/* Ayah */
.ayah-card{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(201,168,76,.03));border:1px solid rgba(201,168,76,.18);border-radius:18px;padding:20px;margin-bottom:18px;text-align:center;animation:fadeUp .5s ease .25s both}
.ayah-badge{font-size:9px;letter-spacing:.18em;color:var(--gold);font-family:'Cinzel',serif;margin-bottom:10px}
.ayah-arabic-txt{font-size:19px;color:rgba(201,168,76,.9);direction:rtl;line-height:2;margin-bottom:10px}
.ayah-trans-txt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--cream-dim);line-height:1.7;margin-bottom:6px}
.ayah-ref-txt{font-size:10px;color:var(--gold);font-family:'Cinzel',serif;letter-spacing:.08em}

/* Bottom nav */
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(4,16,16,.97);backdrop-filter:blur(20px);border-top:1px solid rgba(201,168,76,.1);padding:10px 0 18px;display:flex;justify-content:space-around;z-index:50}
.bnav{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 14px;transition:all .2s}
.bnav-ic{font-size:20px;transition:filter .2s}
.bnav-lbl{font-size:8px;color:rgba(245,240,232,.35);letter-spacing:.08em;font-family:'Cinzel',serif}
.bnav.active .bnav-lbl{color:var(--gold)}
.bnav.active .bnav-ic{filter:drop-shadow(0 0 6px rgba(201,168,76,.7))}

/* ══════════════════════════════════════════
   DHIKR SCREEN
══════════════════════════════════════════ */
#s-dhikr{flex-direction:column;background:var(--teal-mid)}
.dhikr-body{padding:80px 20px 100px;max-width:420px;margin:0 auto;width:100%;text-align:center}
.dhikr-arabic-big{font-size:28px;color:rgba(201,168,76,.9);direction:rtl;line-height:1.9;margin-bottom:6px}
.dhikr-trans-sm{font-size:13px;color:var(--cream-muted);font-style:italic;margin-bottom:24px}
.dhikr-count-big{font-family:'Cinzel',serif;font-size:80px;color:var(--gold-light);line-height:1;margin-bottom:8px}
.dhikr-of{font-size:13px;color:var(--cream-muted);margin-bottom:28px}
.dhikr-tap-btn{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));font-size:40px;color:var(--teal-deep);margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 8px 32px rgba(201,168,76,.35);transition:transform .1s,box-shadow .1s;cursor:pointer;border:none}
.dhikr-tap-btn:active{transform:scale(.93);box-shadow:0 4px 16px rgba(201,168,76,.2)}
.dhikr-prog-bg{width:100%;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:24px}
.dhikr-prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:3px;transition:width .3s ease}
.dhikr-list{text-align:left}
.dhikr-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:12px;margin-bottom:8px;border:1px solid rgba(201,168,76,.1);cursor:pointer;transition:all .3s}
.dhikr-item:hover{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.06)}
.dhikr-item.active-dhikr{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.1)}
.dhikr-item-name{font-size:13px;color:var(--cream-dim)}
.dhikr-item-prog{font-family:'Cinzel',serif;font-size:11px;color:var(--gold)}
.dhikr-reset-btn{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--cream-muted);padding:12px;border-radius:50px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;margin-top:8px;transition:all .3s}
.dhikr-reset-btn:hover{border-color:rgba(201,168,76,.3);color:var(--gold-light)}

/* ══════════════════════════════════════════
   QURAN SCREEN
══════════════════════════════════════════ */
#s-quran{flex-direction:column;background:#0a2e2e}
.quran-body{padding:80px 18px 100px;max-width:480px;margin:0 auto;width:100%}
.quran-search{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.15);border-radius:50px;padding:11px 18px;margin-bottom:18px}
.quran-search input{flex:1;background:transparent;border:none;font-size:13px;color:var(--cream)}
.quran-search input::placeholder{color:rgba(245,240,232,.3);font-style:italic}
.quran-search-icon{font-size:14px;color:rgba(245,240,232,.3)}
.daily-ayah-card{background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.2);border-radius:18px;padding:18px;margin-bottom:18px}
.daily-ayah-lbl{font-size:9px;color:var(--gold);letter-spacing:.16em;font-family:'Cinzel',serif;margin-bottom:10px}
.daily-ayah-arabic{font-size:16px;color:rgba(201,168,76,.9);direction:rtl;line-height:2;margin-bottom:8px}
.daily-ayah-trans{font-size:12px;color:var(--cream-dim);font-style:italic;font-family:'Cormorant Garamond',serif;line-height:1.7;margin-bottom:6px}
.daily-ayah-ref{font-size:10px;color:var(--gold);font-family:'Cinzel',serif}
.surah-section-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.18em;color:rgba(245,240,232,.4);margin-bottom:10px}
.surah-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:all .2s}
.surah-item:hover .surah-name{color:var(--gold-light)}
.surah-num{width:28px;height:28px;border-radius:50%;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:9px;color:var(--gold);flex-shrink:0}
.surah-info{flex:1}
.surah-name{font-family:'Cinzel',serif;font-size:12px;color:rgba(245,240,232,.85);letter-spacing:.05em;transition:color .2s}
.surah-detail{font-size:10px;color:rgba(245,240,232,.35);margin-top:2px}
.surah-arabic{font-size:14px;color:rgba(201,168,76,.55);direction:rtl}

/* ══════════════════════════════════════════
   PROFILE SCREEN
══════════════════════════════════════════ */
#s-profile{flex-direction:column;background:linear-gradient(180deg,#061a1a,#0a2e2e)}
.profile-body{padding:80px 20px 100px;max-width:420px;margin:0 auto;width:100%}
.profile-avatar-wrap{text-align:center;margin-bottom:28px}
.profile-avatar{width:90px;height:90px;border-radius:50%;border:2px solid rgba(201,168,76,.35);box-shadow:0 0 30px rgba(201,168,76,.15);margin-bottom:14px;object-fit:cover}
.profile-name-big{font-family:'Cinzel',serif;font-size:20px;color:var(--gold-light);letter-spacing:.12em}
.profile-email{font-size:12px;color:var(--cream-muted);margin-top:5px}
.profile-joined{font-size:11px;color:rgba(201,168,76,.5);margin-top:3px;font-style:italic;font-family:'Cormorant Garamond',serif}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.pstat{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.12);border-radius:14px;padding:14px 10px;text-align:center}
.pstat-num{font-family:'Cinzel',serif;font-size:24px;color:var(--gold-light)}
.pstat-lbl{font-size:9px;color:var(--cream-muted);letter-spacing:.1em;margin-top:4px}
.profile-section{margin-bottom:20px}
.profile-section-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.18em;color:var(--gold);margin-bottom:10px}
.profile-item{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.1);border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .3s}
.profile-item:hover{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.05)}
.profile-item-left{display:flex;align-items:center;gap:12px}
.profile-item-icon{font-size:20px}
.profile-item-label{font-size:13px;color:var(--cream-dim)}
.profile-item-arrow{font-size:16px;color:rgba(201,168,76,.4)}
.signout-big{width:100%;background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);color:rgba(255,150,150,.8);padding:14px;border-radius:50px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.12em;transition:all .3s;margin-top:8px}
.signout-big:hover{background:rgba(255,80,80,.15);border-color:rgba(255,100,100,.4)}

/* ══════════════════════════════════════════
