<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prayer Times — TaqwaSteps</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;--gold-light:#e8c96a;
  --teal-deep:#061a1a;--teal-mid:#0a2e2e;
  --cream:#f5f0e8;--cream-dim:rgba(245,240,232,.65);
  --cream-muted:rgba(245,240,232,.35);--bg:#061a1a;
}
body{background:var(--bg);font-family:'Lato',sans-serif;color:var(--cream);min-height:100vh;overflow-x:hidden}

/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;opacity:0;animation:twinkle var(--d,3s) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--o,.5)}}
.glow{position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(ellipse,rgba(201,168,76,.09),transparent 65%);pointer-events:none;z-index:0;max-width:100vw}

/* LAYOUT */
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:24px 16px 60px}

/* HEADER */
.hdr{text-align:center;margin-bottom:28px}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;color:var(--cream-muted);background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.12);border-radius:50px;padding:8px 14px;margin-bottom:20px;cursor:pointer;text-decoration:none;transition:all .3s}
.back-btn:hover{color:var(--gold);border-color:rgba(201,168,76,.3)}
.logo-circle{width:64px;height:64px;border-radius:50%;border:2px solid rgba(201,168,76,.3);box-shadow:0 0 28px rgba(201,168,76,.18);margin:0 auto 12px;overflow:hidden;animation:pulse 4s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 28px rgba(201,168,76,.18)}50%{box-shadow:0 0 40px rgba(201,168,76,.32)}}
.logo-circle img{width:100%;height:100%;object-fit:cover}
.app-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.22em;color:var(--gold-light);margin-bottom:4px}
.page-title{font-family:'Cinzel',serif;font-size:22px;letter-spacing:.1em;color:var(--cream)}
.page-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--cream-muted);margin-top:4px}

/* LOCATION BAR */
.loc-bar{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.loc-info{display:flex;flex-direction:column;gap:2px}
.loc-city{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.1em;color:var(--gold-light)}
.loc-date{font-size:11px;color:var(--cream-muted)}
.loc-hijri{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--cream-muted)}
.refresh-btn{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:7px 12px;font-size:10px;font-family:'Cinzel',serif;letter-spacing:.08em;color:var(--gold);cursor:pointer;transition:all .3s}
.refresh-btn:hover{background:rgba(201,168,76,.2)}

/* MADHAB TOGGLE */
.madhab-bar{display:flex;background:rgba(255,255,255,.04);border-radius:50px;padding:4px;margin-bottom:20px;border:1px solid rgba(201,168,76,.1)}
.mtab{flex:1;padding:9px;border-radius:50px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;color:var(--cream-muted);background:none;border:none;cursor:pointer;transition:all .3s}
.mtab.active{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--teal-deep);font-weight:700}

/* NEXT PRAYER BANNER */
.next-banner{background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.06));border:1px solid rgba(201,168,76,.25);border-radius:18px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.next-label{font-size:9px;letter-spacing:.14em;font-family:'Cinzel',serif;color:var(--cream-muted);margin-bottom:4px}
.next-name{font-family:'Cinzel',serif;font-size:16px;color:var(--gold-light);letter-spacing:.08em}
.next-time{font-family:'Cinzel',serif;font-size:28px;color:var(--cream);letter-spacing:.04em}
.next-countdown{font-size:11px;color:var(--cream-muted)}
.next-icon{font-size:36px;opacity:.7}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;gap:10px;margin:22px 0 10px}
.sec-hdr-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.25),transparent)}
.sec-hdr-text{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.16em;color:var(--gold)}
.sec-hdr-icon{font-size:14px}

/* TIME CARD */
.time-card{background:rgba(255,255,255,.025);border:1px solid rgba(201,168,76,.1);border-radius:14px;overflow:hidden;margin-bottom:8px;transition:all .3s}
.time-card.highlighted{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.3)}
.time-card.qaza{background:rgba(139,0,0,.06);border-color:rgba(180,50,50,.15)}
.time-card.special{background:rgba(100,180,100,.05);border-color:rgba(100,200,100,.15)}
.tc-inner{padding:13px 16px;display:flex;align-items:center;justify-content:space-between}
.tc-left{display:flex;align-items:center;gap:12px}
.tc-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;background:rgba(201,168,76,.08);flex-shrink:0}
.time-card.qaza .tc-icon{background:rgba(180,50,50,.1)}
.time-card.special .tc-icon{background:rgba(100,200,100,.08)}
.tc-name{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.06em;color:var(--cream)}
.tc-sub{font-size:10px;color:var(--cream-muted);margin-top:2px;font-family:'Cormorant Garamond',serif;font-style:italic}
.tc-right{text-align:right}
.tc-time{font-family:'Cinzel',serif;font-size:16px;color:var(--gold-light);letter-spacing:.04em}
.tc-time.loading{color:var(--cream-muted);font-size:12px;animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
.tc-badge{font-size:8px;letter-spacing:.1em;font-family:'Cinzel',serif;margin-top:3px;padding:2px 7px;border-radius:50px}
.badge-now{background:rgba(201,168,76,.2);color:var(--gold)}
.badge-hanafi{background:rgba(100,150,255,.1);color:#8aabff}
.badge-shafi{background:rgba(100,220,150,.1);color:#80dfa0}
.badge-both{background:rgba(201,168,76,.08);color:var(--cream-muted)}

/* BOTH MADHAB ROW */
.dual-row{background:rgba(255,255,255,.025);border:1px solid rgba(201,168,76,.1);border-radius:14px;overflow:hidden;margin-bottom:8px}
.dual-header{padding:11px 16px 0;display:flex;align-items:center;gap:10px}
.dual-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;background:rgba(201,168,76,.08);flex-shrink:0}
.dual-name{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.06em;color:var(--cream)}
.dual-sub{font-size:10px;color:var(--cream-muted);margin-top:2px;font-family:'Cormorant Garamond',serif;font-style:italic}
.dual-times{display:flex;padding:10px 16px 13px;gap:10px}
.dual-cell{flex:1;background:rgba(255,255,255,.03);border-radius:10px;padding:8px 10px;text-align:center}
.dual-cell-label{font-size:8px;letter-spacing:.12em;font-family:'Cinzel',serif;margin-bottom:4px}
.dual-cell-label.hanafi{color:#8aabff}
.dual-cell-label.shafi{color:#80dfa0}
.dual-cell-time{font-family:'Cinzel',serif;font-size:14px;color:var(--gold-light)}

/* QAZA DUAL */
.dual-row.qaza{background:rgba(139,0,0,.06);border-color:rgba(180,50,50,.15)}
.dual-row.qaza .dual-icon{background:rgba(180,50,50,.1)}

/* LOADING STATE */
.loading-state{text-align:center;padding:50px 20px}
.load-spinner{width:40px;height:40px;border:2px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--cream-muted);font-size:14px}

/* ERROR STATE */
.err-state{text-align:center;padding:40px 20px;background:rgba(255,255,255,.025);border:1px solid rgba(201,168,76,.1);border-radius:18px}
.err-icon{font-size:36px;margin-bottom:12px}
.err-txt{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.06em;color:var(--cream-muted);margin-bottom:16px}
.err-btn{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--teal-deep);border:none;border-radius:50px;padding:11px 24px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;cursor:pointer;font-weight:700}

/* NOTE */
.note-box{background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.08);border-radius:12px;padding:14px 16px;margin-top:16px}
.note-txt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--cream-muted);line-height:1.7;text-align:center}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow"></div>

<div class="wrap">

  <!-- HEADER -->
  <div class="hdr">
    <a href="webapp.html" class="back-btn">← Back to App</a>
    <div class="logo-circle">
      <img src="logo.png" alt="TaqwaSteps" onerror="this.parentNode.innerHTML='🌙'"/>
    </div>
    <div class="app-name">TAQWASTEPS</div>
    <div class="page-title">Prayer Times</div>
    <div class="page-sub">Walk With Faith · Each Step Toward Allah</div>
  </div>

  <!-- LOCATION BAR -->
  <div class="loc-bar">
    <div class="loc-info">
      <div class="loc-city" id="loc-city">Detecting location...</div>
      <div class="loc-date" id="loc-date">—</div>
      <div class="loc-hijri" id="loc-hijri">—</div>
    </div>
    <button class="refresh-btn" onclick="init()">↻ REFRESH</button>
  </div>

  <!-- MADHAB TOGGLE -->
  <div class="madhab-bar">
    <button class="mtab active" id="tab-both" onclick="setMadhab('both')">BOTH</button>
    <button class="mtab" id="tab-hanafi" onclick="setMadhab('hanafi')">HANAFI</button>
    <button class="mtab" id="tab-shafi" onclick="setMadhab('shafi')">SHAFI</button>
  </div>

  <!-- NEXT PRAYER BANNER -->
  <div class="next-banner" id="next-banner">
    <div>
      <div class="next-label">NEXT PRAYER</div>
      <div class="next-name" id="next-name">Loading...</div>
      <div class="next-time" id="next-time">—:—</div>
      <div class="next-countdown" id="next-countdown">Calculating...</div>
    </div>
    <div class="next-icon" id="next-icon">🕌</div>
  </div>

  <!-- PRAYER TIMES CONTENT -->
  <div id="content">
    <div class="loading-state">
      <div class="load-spinner"></div>
      <div class="load-txt">Fetching prayer times...</div>
    </div>
  </div>

</div>

<script>
var lat = null, lng = null;
var timesHanafi = null, timesShafi = null;
var currentMadhab = 'both';
var countdownInterval = null;

/* ── STARS ── */
(function(){
  var s = document.getElementById('stars');
  for(var i=0;i<80;i++){
    var d=document.createElement('div');
    d.className='star';
    d.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+(Math.random()*2+1)+'px;height:'+(Math.random()*2+1)+'px;--d:'+(Math.random()*4+2)+'s;--o:'+(Math.random()*.6+.2)+';animation-delay:'+(Math.random()*4)+'s';
    s.appendChild(d);
  }
})();

/* ── UTILS ── */
function fmt12(t){
  if(!t) return '—:—';
  var parts = t.split(':');
  var h = parseInt(parts[0]), m = parts[1];
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + m + ' ' + ampm;
}

function addMins(t, mins){
  if(!t) return '—:—';
  var parts = t.split(':');
  var total = parseInt(parts[0])*60 + parseInt(parts[1]) + mins;
  total = ((total % 1440) + 1440) % 1440;
  var h = Math.floor(total/60), m = total%60;
  return fmt12(pad(h)+':'+pad(m));
}

function pad(n){ return n < 10 ? '0'+n : ''+n; }

function timeToMins(t){
  if(!t || t==='—:—') return -1;
  var clean = t.replace(' AM','').replace(' PM','');
  var parts = clean.split(':');
  var h = parseInt(parts[0]), m = parseInt(parts[1]);
  var isPM = t.indexOf('PM') >= 0;
  if(isPM && h !== 12) h += 12;
  if(!isPM && h === 12) h = 0;
  return h*60 + m;
}

function rawToMins(t){
  if(!t) return -1;
  var parts = t.split(':');
  return parseInt(parts[0])*60 + parseInt(parts[1]);
}

function nowMins(){
  var n = new Date();
  return n.getHours()*60 + n.getMinutes();
}

function minsToCountdown(target){
  var now = nowMins();
  var diff = target - now;
  if(diff < 0) diff += 1440;
  var h = Math.floor(diff/60), m = diff%60;
  if(h > 0) return 'in ' + h + 'h ' + m + 'm';
  return 'in ' + m + ' min';
}

/* ── MADHAB SWITCH ── */
function setMadhab(m){
  currentMadhab = m;
  document.getElementById('tab-both').className = 'mtab' + (m==='both'?' active':'');
  document.getElementById('tab-hanafi').className = 'mtab' + (m==='hanafi'?' active':'');
  document.getElementById('tab-shafi').className = 'mtab' + (m==='shafi'?' active':'');
  if(timesHanafi && timesShafi) render();
}

/* ── INIT ── */
function init(){
  document.getElementById('content').innerHTML = '<div class="loading-state"><div class="load-spinner"></div><div class="load-txt">Detecting location...</div></div>';
  document.getElementById('loc-city').textContent = 'Detecting...';

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;
      fetchAll();
    }, function(){
      // fallback to IP location
      fetchByIP();
    }, {timeout:8000});
  } else {
    fetchByIP();
  }
}

function fetchByIP(){
  fetch('https://ipapi.co/json/')
    .then(function(r){ return r.json(); })
    .then(function(d){
      lat = d.latitude; lng = d.longitude;
      fetchAll();
    }).catch(function(){
      showError('Could not detect location. Please allow location access.');
    });
}

function fetchAll(){
  // Fetch city name
  fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lng+'&format=json')
    .then(function(r){ return r.json(); })
    .then(function(d){
      var city = d.address.city || d.address.town || d.address.village || d.address.county || 'Your Location';
      var country = d.address.country_code ? d.address.country_code.toUpperCase() : '';
      document.getElementById('loc-city').textContent = '📍 ' + city + (country ? ', ' + country : '');
    }).catch(function(){
      document.getElementById('loc-city').textContent = '📍 Location Detected';
    });

  var today = new Date();
  var dd = pad(today.getDate()), mm = pad(today.getMonth()+1), yyyy = today.getFullYear();
  var dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('loc-date').textContent = dayNames[today.getDay()] + ', ' + dd + ' ' + monthNames[today.getMonth()] + ' ' + yyyy;

  // Method 1 = Karachi (used for Hanafi), school=1 = Hanafi Asr
  var baseUrl = 'https://api.aladhan.com/v1/timings/'+dd+'-'+mm+'-'+yyyy+'?latitude='+lat+'&longitude='+lng;
  var hanafiUrl = baseUrl + '&method=1&school=1'; // Hanafi Asr
  var shafiUrl  = baseUrl + '&method=3&school=0'; // Shafi/ISNA Asr

  Promise.all([
    fetch(hanafiUrl).then(function(r){ return r.json(); }),
    fetch(shafiUrl).then(function(r){ return r.json(); })
  ]).then(function(results){
    timesHanafi = results[0].data.timings;
    timesShafi  = results[1].data.timings;
    var hijri = results[0].data.date.hijri;
    document.getElementById('loc-hijri').textContent = hijri.day + ' ' + hijri.month.en + ' ' + hijri.year + ' AH';
    render();
    startCountdown();
  }).catch(function(){
    showError('Failed to fetch prayer times. Check your internet connection.');
  });
}

/* ── RENDER ── */
function render(){
  var H = timesHanafi, S = timesShafi;
  var m = currentMadhab;

  // Derived times
  var ishraqTime = fmt12(addRaw(H.Sunrise, 15)); // 15 mins after sunrise
  var chastTime = midpoint(H.Sunrise, H.Dhuhr);  // midway between sunrise and zuhr
  var zawalTime = addMins(fmt12(H.Dhuhr), -5);   // 5 mins before Zuhr

  // Last 1/3 night
  var lastThirdTime = lastThird(H.Maghrib, H.Fajr);

  var html = '';

  /* ═══ FAJR ═══ */
  html += secHdr('🌙', 'FAJR');
  html += card('🌙', 'Fajr', 'Subh Sadiq · Dawn begins', fmt12(H.Fajr), false, false, isNow('Fajr'));
  html += card('⏳', 'Fajr Qaza ends', 'Qaza must be prayed after sunrise', fmt12(H.Sunrise), true, false, false);

  /* ═══ SUNRISE & NAWAFIL ═══ */
  html += secHdr('🌅', 'SUNRISE & NAWAFIL');
  html += card('🌅', 'Sunrise', 'Fajr time ends · Makrooh begins', fmt12(H.Sunrise), false, true, false);
  html += card('☀️', 'Ishraq', '~15 mins after sunrise', ishraqTime, false, true, false);
  html += card('🌤️', 'Chast (Duha)', 'Midway between sunrise & Zuhr', chastTime, false, true, false);
  html += card('⚡', 'Zawal', '~5 mins before Zuhr · Makrooh', zawalTime, false, false, false);

  /* ═══ ZUHR ═══ */
  html += secHdr('☀️', 'ZUHR');
  if(m === 'both'){
    html += dualCard('🕌', 'Zuhr Start', 'Midday prayer begins', fmt12(H.Dhuhr), fmt12(S.Dhuhr), false);
    html += dualCard('⏳', 'Zuhr Qaza ends', 'Qaza window closes at Asr', fmt12(H.Asr), fmt12(S.Asr), true);
  } else if(m === 'hanafi'){
    html += card('🕌', 'Zuhr', 'Midday prayer', fmt12(H.Dhuhr), false, false, isNow('Dhuhr'));
    html += card('⏳', 'Zuhr Qaza ends', 'At Asr time (Hanafi)', fmt12(H.Asr), true, false, false);
  } else {
    html += card('🕌', 'Zuhr', 'Midday prayer', fmt12(S.Dhuhr), false, false, false);
    html += card('⏳', 'Zuhr Qaza ends', 'At Asr time (Shafi)', fmt12(S.Asr), true, false, false);
  }

  /* ═══ ASR ═══ */
  html += secHdr('🌆', 'ASR');
  if(m === 'both'){
    html += dualCard('🕌', 'Asr Start', 'Afternoon prayer', fmt12(H.Asr), fmt12(S.Asr), false);
    html += dualCard('⏳', 'Asr Qaza ends', 'Qaza window closes at Maghrib', fmt12(H.Maghrib), fmt12(S.Maghrib), true);
  } else if(m === 'hanafi'){
    html += card('🕌', 'Asr', 'Shadow = 2× object (Hanafi)', fmt12(H.Asr), false, false, isNow('Asr'));
    html += card('⏳', 'Asr Qaza ends', 'At Maghrib time', fmt12(H.Maghrib), true, false, false);
  } else {
    html += card('🕌', 'Asr', 'Shadow = 1× object (Shafi)', fmt12(S.Asr), false, false, false);
    html += card('⏳', 'Asr Qaza ends', 'At Maghrib time', fmt12(S.Maghrib), true, false, false);
  }

  /* ═══ MAGHRIB & IFTAR ═══ */
  html += secHdr('🌇', 'MAGHRIB & IFTAR');
  html += card('🌇', 'Maghrib / Iftar', 'Sunset · Fast breaks here', fmt12(H.Maghrib), false, false, isNow('Maghrib'));
  html += card('⏳', 'Maghrib Qaza ends', 'Qaza window closes at Isha', fmt12(H.Isha), true, false, false);

  /* ═══ ISHA ═══ */
  html += secHdr('🌙', 'ISHA');
  html += card('🕌', 'Isha', 'Night prayer begins', fmt12(H.Isha), false, false, isNow('Isha'));
  html += card('⏳', 'Isha Qaza ends', 'Qaza window closes at Subh Sadiq', fmt12(H.Fajr) + ' (next day)', true, false, false);

  /* ═══ TAHAJJUD & SEHRI ═══ */
  html += secHdr('✨', 'TAHAJJUD & SEHRI');
  html += card('✨', 'Last ⅓ of Night', 'Best time for Tahajjud & Dua', lastThirdTime, false, true, false);
  html += card('🍽️', 'Sehri Start', 'Last ⅓ of night begins', lastThirdTime, false, true, false);
  html += card('🚫', 'Sehri Ends', 'Subh Sadiq · Fast begins', fmt12(H.Fajr), false, false, false);

  html += '<div class="note-box"><div class="note-txt">All times calculated for your location · Hanafi Asr: shadow = 2× object · Shafi Asr: shadow = 1× object · Ishraq: 15 mins after sunrise · Chast: midway between sunrise and Zuhr · Last ⅓ night: calculated from Maghrib to Fajr</div></div>';

  document.getElementById('content').innerHTML = html;
}

function secHdr(icon, text){
  return '<div class="sec-hdr"><div class="sec-hdr-line"></div><span class="sec-hdr-icon">'+icon+'</span><span class="sec-hdr-text">'+text+'</span><div class="sec-hdr-line"></div></div>';
}

function card(icon, name, sub, time, isQaza, isSpecial, isCurrentPrayer){
  var cls = 'time-card';
  if(isQaza) cls += ' qaza';
  else if(isSpecial) cls += ' special';
  if(isCurrentPrayer) cls += ' highlighted';
  var badge = isCurrentPrayer ? '<div class="tc-badge badge-now">● NOW</div>' : '';
  return '<div class="'+cls+'"><div class="tc-inner"><div class="tc-left"><div class="tc-icon">'+icon+'</div><div><div class="tc-name">'+name+'</div><div class="tc-sub">'+sub+'</div></div></div><div class="tc-right"><div class="tc-time">'+time+'</div>'+badge+'</div></div></div>';
}

function dualCard(icon, name, sub, hTime, sTime, isQaza){
  var cls = 'dual-row' + (isQaza?' qaza':'');
  return '<div class="'+cls+'"><div class="dual-header"><div class="dual-icon">'+icon+'</div><div><div class="dual-name">'+name+'</div><div class="dual-sub">'+sub+'</div></div></div><div class="dual-times"><div class="dual-cell"><div class="dual-cell-label hanafi">HANAFI</div><div class="dual-cell-time">'+hTime+'</div></div><div class="dual-cell"><div class="dual-cell-label shafi">SHAFI</div><div class="dual-cell-time">'+sTime+'</div></div></div></div>';
}

function addRaw(rawTime, mins){
  var parts = rawTime.split(':');
  var total = parseInt(parts[0])*60 + parseInt(parts[1]) + mins;
  total = ((total % 1440) + 1440) % 1440;
  return pad(Math.floor(total/60))+':'+pad(total%60);
}

function midpoint(t1, t2){
  var p1 = t1.split(':'), p2 = t2.split(':');
  var m1 = parseInt(p1[0])*60+parseInt(p1[1]);
  var m2 = parseInt(p2[0])*60+parseInt(p2[1]);
  var mid = Math.floor((m1+m2)/2);
  return fmt12(pad(Math.floor(mid/60))+':'+pad(mid%60));
}

function lastThird(maghribRaw, fajrRaw){
  var m1 = rawToMins(maghribRaw);
  var m2 = rawToMins(fajrRaw);
  if(m2 < m1) m2 += 1440; // crosses midnight
  var nightLen = m2 - m1;
  var lastThirdStart = m1 + Math.floor(nightLen * 2/3);
  lastThirdStart = lastThirdStart % 1440;
  return fmt12(pad(Math.floor(lastThirdStart/60))+':'+pad(lastThirdStart%60));
}

function isNow(prayer){
  if(!timesHanafi) return false;
  var order = ['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];
  var idx = order.indexOf(prayer);
  if(idx < 0) return false;
  var now = nowMins();
  var start = rawToMins(timesHanafi[prayer]);
  var endPrayer = idx+1 < order.length ? rawToMins(timesHanafi[order[idx+1]]) : rawToMins(timesHanafi['Fajr'])+1440;
  if(endPrayer < start) endPrayer += 1440;
  var nowAdj = now < start ? now + 1440 : now;
  return nowAdj >= start && nowAdj < endPrayer;
}

/* ── NEXT PRAYER COUNTDOWN ── */
function startCountdown(){
  if(countdownInterval) clearInterval(countdownInterval);
  updateCountdown();
  countdownInterval = setInterval(updateCountdown, 30000);
}

function updateCountdown(){
  if(!timesHanafi) return;
  var prayers = [
    {name:'Fajr', key:'Fajr', icon:'🌙'},
    {name:'Sunrise', key:'Sunrise', icon:'🌅'},
    {name:'Zuhr', key:'Dhuhr', icon:'☀️'},
    {name:'Asr', key:'Asr', icon:'🌆'},
    {name:'Maghrib', key:'Maghrib', icon:'🌇'},
    {name:'Isha', key:'Isha', icon:'🌙'}
  ];
  var now = nowMins();
  var next = null;
  for(var i=0;i<prayers.length;i++){
    var t = rawToMins(timesHanafi[prayers[i].key]);
    if(t > now){ next = {name:prayers[i].name, time:t, icon:prayers[i].icon, raw:timesHanafi[prayers[i].key]}; break; }
  }
  if(!next){
    next = {name:'Fajr', time:rawToMins(timesHanafi['Fajr'])+1440, icon:'🌙', raw:timesHanafi['Fajr']};
  }
  document.getElementById('next-name').textContent = next.name;
  document.getElementById('next-time').textContent = fmt12(next.raw);
  document.getElementById('next-countdown').textContent = minsToCountdown(next.time);
  document.getElementById('next-icon').textContent = next.icon;
}

/* ── ERROR ── */
function showError(msg){
  document.getElementById('content').innerHTML = '<div class="err-state"><div class="err-icon">🌙</div><div class="err-txt">'+msg+'</div><button class="err-btn" onclick="init()">TRY AGAIN</button></div>';
}

/* ── START ── */
init();
</script>
